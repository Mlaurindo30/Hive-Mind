name: Hive-Mind Test Suite

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"

jobs:
  full-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SINAPSE_HOME: ${{ github.workspace }}
      NEURAL_MEMORY_DIR: ${{ github.workspace }}/neural-memory/data
      CLAUDE_MEM_DATA_DIR: ${{ github.workspace }}/claude-mem/data
      CLAUDE_MEM_WORKER_HOST: 127.0.0.1
      CLAUDE_MEM_WORKER_PORT: "37700"
      CLAUDE_MEM_CHROMA_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.15"
          enable-cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.95.0"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y sqlite3

      - name: Bootstrap pinned components
        run: |
          python3 scripts/components.py bootstrap --strict
          python3 scripts/components.py verify

      - name: Synchronize project environment
        run: uv sync --frozen --all-groups

      - name: Install Claude-Mem runtime
        working-directory: claude-mem/plugin
        run: |
          mkdir -p ../../.tools/bin
          cp "$(command -v bun)" ../../.tools/bin/bun
          ../../.tools/bin/bun install --frozen-lockfile

      - name: Build pinned RTK
        working-directory: rtk
        run: cargo build --locked --release

      - name: Start Claude-Mem worker
        run: |
          mkdir -p "$CLAUDE_MEM_DATA_DIR" logs
          nohup .tools/bin/bun claude-mem/plugin/scripts/worker-service.cjs \
            > logs/claude-mem-ci.log 2>&1 &
          echo $! > logs/claude-mem-ci.pid
          for attempt in $(seq 1 30); do
            curl -fsS http://127.0.0.1:37700/health && exit 0
            sleep 1
          done
          cat logs/claude-mem-ci.log
          exit 1

      - name: Run installed-system test suite
        run: ./tests/run_all.sh

      - name: Upload diagnostic logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hive-mind-ci-logs
          path: logs/

  real-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: full-suite
    env:
      SINAPSE_HOME: ${{ github.workspace }}
      NEURAL_MEMORY_DIR: ${{ github.workspace }}/neural-memory/data
      CLAUDE_MEM_DATA_DIR: ${{ github.workspace }}/claude-mem/data
      CLAUDE_MEM_WORKER_HOST: 127.0.0.1
      CLAUDE_MEM_WORKER_PORT: "37700"
      CLAUDE_MEM_CHROMA_ENABLED: "false"
      FALKORDB_HOST: 127.0.0.1
      FALKORDB_PORT: "6379"
      RAGFLOW_BASE: http://127.0.0.1:9380
      RAGFLOW_API_KEY: ${{ secrets.RAGFLOW_API_KEY || 'ci-no-auth' }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.15"
          enable-cache: true

      - name: Synchronize project environment
        run: uv sync --frozen --all-groups

      - name: Install docker compose plugin
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose-plugin

      - name: Start FalkorDB
        run: |
          docker compose -f docker-compose.falkordb.yml up -d --quiet-pull
          for i in $(seq 1 30); do
            (echo > /dev/tcp/127.0.0.1/6379) 2>/dev/null && exit 0
            sleep 1
          done
          echo "FalkorDB nao subiu" >&2
          exit 1

      - name: Start RAGFlow
        run: |
          docker compose -f integrations/ragflow/docker-compose.yml up -d --quiet-pull
          for i in $(seq 1 120); do
            curl -fsS -m 2 http://127.0.0.1:9380/api/v1/health >/dev/null && exit 0
            sleep 1
          done
          echo "RAGFlow nao subiu" >&2
          exit 1

      - name: Start Claude-Mem worker
        run: |
          mkdir -p "$CLAUDE_MEM_DATA_DIR" logs
          nohup .tools/bin/bun claude-mem/plugin/scripts/worker-service.cjs \
            > logs/claude-mem-ci-real.log 2>&1 &
          echo $! > logs/claude-mem-ci-real.pid
          for attempt in $(seq 1 30); do
            curl -fsS http://127.0.0.1:37700/health && exit 0
            sleep 1
          done
          cat logs/claude-mem-ci-real.log
          exit 1

      - name: Run K9 real suite (local-full)
        run: |
          mkdir -p docs/reports
          ./tests/run_real_knowledge.sh \
            --report=docs/reports/k9-real-suite-ci.md

      - name: Run audit_test_layering
        run: .venv/bin/python scripts/setup/audit_test_layering.py

      - name: Upload K9 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k9-real-suite-report
          path: |
            docs/reports/k9-real-suite-ci.md
            docs/reports/k9/test-layering-audit.md
            docs/reports/k9-real-suite-ci.md.junit.xml
